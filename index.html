<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clein's Beer Dye Classic 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;-webkit-text-size-adjust:100%;}
body{background:#0c0c0c;color:#f0f0f0;font-family:'DM Mono',monospace;min-height:100vh;padding-bottom:90px;overscroll-behavior:none;}
input,button,select{font-family:inherit;-webkit-appearance:none;appearance:none;}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
:root{
  --bg:#0c0c0c;--bg2:#121212;--card:#181818;--card2:#1e1e1e;
  --border:#262626;--border2:#363636;--text:#f0f0f0;
  --muted:#555;--muted2:#888;
  --gold:#e9b94c;--win:#3ecf70;--loss:#e05050;
  --wb:#59b9e0;--lb:#e07a40;
  --tap:52px;--radius:10px;
}

/* ── HEADER ── */
.hdr{text-align:center;padding:32px 20px 24px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#1c1200 0%,transparent 100%);}
.hdr-eye{font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;opacity:.8;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:.9;letter-spacing:1px;}
.hdr-title em{color:var(--gold);font-style:normal;}
.hdr-loc{margin-top:12px;font-size:12px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;}

/* ── BOTTOM NAV ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;z-index:200;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.bnav-btn{
  flex:1;background:none;border:none;border-top:2px solid transparent;
  color:var(--muted);padding:12px 4px 10px;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:color .15s;min-height:56px;
}
.bnav-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.bnav-btn.active{color:var(--gold);border-top-color:var(--gold);}

/* ── PANELS ── */
.panel{display:none;padding:20px 16px 0;}
.panel.active{display:block;}

/* ── SECTION HEAD ── */
.sec-head{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  color:var(--gold);margin-bottom:16px;padding-bottom:10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:baseline;gap:10px;
}
.sec-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);letter-spacing:1px;}

/* ── INFO BOX ── */
.info-box{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;font-size:13px;color:var(--muted2);line-height:1.7;margin-bottom:16px;
}
.info-box strong{color:var(--text);}

/* ── TEAMS PAGE ── */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.team-tile{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;}
.team-tile-grp{font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px;}
.team-tile-grp.ga{color:var(--wb);}
.team-tile-grp.gb{color:var(--lb);}
.team-tile-seed{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;color:var(--text);margin-bottom:8px;}
.team-tile-players{font-size:12px;color:var(--muted2);line-height:1.8;}

/* ── GROUP STAGE TAB ── */
.group-block{margin-bottom:24px;}
.group-block-head{
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.group-block-head.ga{color:var(--wb);}
.group-block-head.gb{color:var(--lb);}
.group-block-note{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.match-row{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.match-num{font-size:11px;color:var(--muted);min-width:18px;flex-shrink:0;}
.match-teams{flex:1;display:flex;align-items:center;gap:6px;min-width:0;}
.mteam{
  flex:1;font-size:12px;text-align:center;padding:8px 6px;
  border-radius:6px;border:1px solid var(--border2);color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-height:var(--tap);display:flex;align-items:center;justify-content:center;
}
.mteam.win{background:#3ecf7015;border-color:var(--win);color:var(--win);}
.mteam.lose{opacity:.3;border-color:#1e1e1e;}
.mvs{font-size:10px;color:var(--muted);letter-spacing:1px;flex-shrink:0;}
.mscore{font-size:13px;color:var(--muted2);flex-shrink:0;min-width:38px;text-align:center;font-weight:500;}

/* ── STANDINGS ── */
.std-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;}
.std-card-head{padding:12px 14px;background:var(--card2);border-bottom:1px solid var(--border);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
.std-tbl{width:100%;border-collapse:collapse;}
.std-tbl th{padding:9px 12px;font-size:11px;color:var(--muted);letter-spacing:1px;text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase;}
.std-tbl td{padding:11px 12px;font-size:13px;border-bottom:1px solid #161616;}
.std-tbl tr:last-child td{border-bottom:none;}
.std-rank{color:var(--muted);font-size:11px;width:24px;}
.std-diff{font-size:11px;color:var(--muted2);}

/* ── BRACKET ── */
#tab-bracket{padding:16px 0 0;}
.bracket-panel-head{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  color:var(--gold);margin-bottom:4px;padding:0 16px 10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:baseline;gap:10px;
}
.bracket-scroll-wrap{
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:16px 16px 8px;
}
.bracket-canvas{
  display:flex;flex-direction:column;gap:0;
  min-width:700px;
  position:relative;
}
/* Round column headers */
.bracket-col-headers{
  display:flex;margin-bottom:10px;
}
.bch{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  text-align:center;color:var(--muted);padding:4px 0;
  border-bottom:1px solid var(--border);
}

/* The actual bracket grid */
.bracket-grid{
  display:flex;
  gap:0;
  position:relative;
}
.bracket-col{
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  flex:1;
  padding:0 6px;
  position:relative;
}
/* Match slot */
.bslot{
  display:flex;
  flex-direction:column;
  position:relative;
  margin:4px 0;
}
.bslot-inner{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
}
.bslot-inner.wb-slot{border-left:3px solid #59b9e055;}
.bslot-inner.lb-slot{border-left:3px solid #e07a4055;}
.bslot-inner.gf-slot{border-left:3px solid #e9b94c88;}

/* Team row inside slot */
.brow{
  display:flex;align-items:center;gap:6px;
  padding:9px 10px;font-size:12px;
  border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;
  color:var(--text);transition:background .1s;
  min-height:44px;
}
.brow:last-of-type{border-bottom:none;}
.brow:active{background:#222;}
.brow.win{background:#3ecf7012;color:var(--win);}
.brow.lose{opacity:.28;}
.brow.tbd{color:var(--muted);font-style:italic;font-size:11px;cursor:default;pointer-events:none;}
.brow-seed{
  background:#1e1e1e;color:var(--muted);font-size:8px;
  padding:2px 5px;border-radius:3px;min-width:22px;text-align:center;flex-shrink:0;
}
.brow.win .brow-seed{background:#3ecf7020;color:var(--win);}
.brow-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;}
.brow-score{font-size:10px;color:var(--muted2);flex-shrink:0;letter-spacing:.5px;}
.brow.win .brow-score{color:#3ecf7066;}
/* Score under slot */
.bslot-score{
  font-size:10px;color:var(--muted);text-align:center;
  padding:2px 0 0;letter-spacing:.5px;
}

/* Section divider */
.bracket-section-div{
  display:flex;align-items:center;gap:12px;
  padding:14px 0 10px;
}
.bsd-line{flex:1;height:1px;background:var(--border);}
.bsd-lbl{
  font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;
  color:var(--lb);white-space:nowrap;
}

/* Grand Final */
.gf-note-bar{
  background:var(--card);border:1px solid #e9b94c33;
  border-radius:8px;padding:10px 14px;
  font-size:11px;color:var(--muted2);text-align:center;
  margin-bottom:10px;line-height:1.5;
}
.champion{
  text-align:center;margin:20px 16px 0;padding:26px 16px;
  background:var(--card);border:1px solid var(--gold);border-radius:var(--radius);
  background-image:radial-gradient(ellipse at 50% 0%,#e9b94c0a 0%,transparent 70%);
}
.champ-lbl{font-size:10px;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;}
.champ-name{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--gold);letter-spacing:1px;line-height:1.1;}
.champ-players{font-size:13px;color:var(--muted2);margin-top:6px;}

/* Score modal */
.score-modal-overlay{
  position:fixed;inset:0;background:#000000cc;z-index:500;
  display:flex;align-items:flex-end;justify-content:center;
}
.score-modal{
  background:var(--card2);border:1px solid var(--border2);
  border-radius:16px 16px 0 0;padding:20px 20px 32px;
  width:100%;max-width:480px;
  padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));
}
.score-modal-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold);margin-bottom:2px;}
.score-modal-sub{font-size:11px;color:var(--muted2);margin-bottom:18px;}
.score-modal-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.score-modal-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;}
.score-modal-nm{font-size:12px;color:var(--muted2);text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.score-modal-input{
  width:84px;height:68px;background:var(--bg);border:2px solid var(--border2);
  color:var(--text);text-align:center;font-family:'Bebas Neue',sans-serif;
  font-size:42px;border-radius:10px;display:block;transition:border-color .2s;
}
.score-modal-input:focus{outline:none;border-color:var(--gold);}
.score-modal-vs{font-size:12px;color:var(--muted);flex-shrink:0;}
.score-modal-win-row{display:flex;gap:8px;margin-bottom:8px;}
.smbtn{
  flex:1;border:none;padding:13px 8px;border-radius:10px;
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;
  cursor:pointer;min-height:var(--tap);line-height:1.2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
}
.smbtn:active{opacity:.85;}
.smbtn-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;opacity:.7;}
.score-modal-btns{display:flex;gap:8px;}
.score-modal-cancel{
  flex:1;background:transparent;border:1px solid var(--border2);color:var(--muted2);
  padding:12px;border-radius:10px;font-family:'DM Mono',monospace;
  font-size:12px;cursor:pointer;min-height:var(--tap);
}
.score-modal-cancel:active{border-color:var(--loss);color:var(--loss);}
.score-modal-save-only{
  flex:1;background:var(--card);border:1px solid var(--border2);color:var(--muted2);
  padding:12px;border-radius:10px;font-family:'DM Mono',monospace;
  font-size:11px;cursor:pointer;min-height:var(--tap);
}
.score-modal-save-only:active{border-color:var(--gold);color:var(--gold);}

/* ── ADMIN ── */
.admin-phase{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
.admin-phase-head{
  padding:16px 14px;background:var(--card2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;min-height:var(--tap);
}
.phase-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;display:flex;align-items:center;gap:10px;}
.phase-num{
  background:var(--border2);color:var(--muted2);font-size:12px;
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:'DM Mono',monospace;flex-shrink:0;
}
.phase-num.done{background:#3ecf7025;color:var(--win);}
.phase-toggle{font-size:18px;color:var(--muted);transition:transform .2s;line-height:1;}
.phase-toggle.open{transform:rotate(180deg);}
.admin-phase-body{padding:16px;}
.admin-phase-body.hidden{display:none;}

/* ── TEAM INPUTS ── */
.team-input-row{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;}
.team-input-lbl{font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;text-transform:uppercase;}
/* STACKED — no more side-by-side */
.input-stack{display:flex;flex-direction:column;gap:8px;}
.txt-input{
  background:var(--bg);border:1px solid var(--border2);color:var(--text);
  padding:0 14px;border-radius:8px;font-family:'DM Mono',monospace;
  font-size:15px;width:100%;height:var(--tap);transition:border-color .2s;
}
.txt-input:focus{outline:none;border-color:var(--gold);}
.txt-input::placeholder{color:var(--muted);}

/* ── GROUP ASSIGN ── */
.assign-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.assign-col-head{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;margin-bottom:10px;text-align:center;}
.assign-col-head.ga{color:var(--wb);}
.assign-col-head.gb{color:var(--lb);}
.assign-slot{
  background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;margin-bottom:6px;font-size:12px;
  min-height:46px;display:flex;align-items:center;gap:8px;
}
.assign-slot.ga-slot{border-color:#59b9e035;}
.assign-slot.gb-slot{border-color:#e07a4035;}
.slot-num{font-size:10px;color:var(--muted);min-width:14px;flex-shrink:0;}
.slot-name{flex:1;color:var(--muted2);font-size:11px;font-style:italic;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.slot-name.filled{color:var(--text);font-style:normal;}
/* Big tap target for remove */
.slot-x{
  font-size:14px;color:var(--muted);cursor:pointer;
  min-width:var(--tap);min-height:var(--tap);
  display:flex;align-items:center;justify-content:center;
  margin:-10px -12px -10px 0;border-radius:0 8px 8px 0;
  flex-shrink:0;
}
.slot-x:active{background:#2a2a2a;color:var(--loss);}
.picker-lbl{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.picker-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.picker-btn{
  background:var(--bg2);border:1px solid var(--border2);color:var(--text);
  padding:12px 8px;border-radius:8px;font-family:'DM Mono',monospace;
  font-size:12px;cursor:pointer;text-align:center;
  min-height:var(--tap);display:flex;align-items:center;justify-content:center;
  line-height:1.4;transition:all .15s;
}
.picker-btn:active{border-color:var(--gold);background:#1e1e1e;}
.picker-btn.in-a{border-color:var(--wb);color:var(--wb);background:#59b9e010;}
.picker-btn.in-b{border-color:var(--lb);color:var(--lb);background:#e07a4010;}

/* ── SCORE INPUT ── */
.score-section-lbl{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:4px 0 12px;}
.score-game-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;}
.score-game-lbl{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;line-height:1.5;}
.score-row{display:flex;align-items:center;gap:12px;}
.score-team-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;}
.score-team-nm{
  font-size:12px;color:var(--muted2);text-align:center;
  width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.score-big{
  width:80px;background:var(--bg);border:2px solid var(--border2);color:var(--text);
  text-align:center;font-family:'Bebas Neue',sans-serif;font-size:36px;
  padding:6px 4px;border-radius:8px;height:60px;transition:border-color .2s;
  display:block;
}
.score-big:focus{outline:none;border-color:var(--gold);}
.score-vs{font-size:12px;color:var(--muted);letter-spacing:1px;flex-shrink:0;}
.save-btn{
  width:100%;margin-top:12px;background:var(--gold);color:#0a0a0a;border:none;
  padding:14px;border-radius:8px;font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:2px;cursor:pointer;
  height:var(--tap);display:flex;align-items:center;justify-content:center;
}
.save-btn:active{opacity:.85;transform:scale(.98);}
.save-btn.saved{background:var(--win);}

/* ── BRACKET SCORE PICK ── */
.bscore-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:10px;}
.bscore-lbl{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;line-height:1.5;}
.bscore-btns{display:flex;gap:8px;}
.bscore-btn{
  flex:1;padding:12px 8px;border-radius:8px;border:1px solid var(--border2);
  font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;
  color:var(--text);background:var(--bg);text-align:center;
  min-height:var(--tap);display:flex;align-items:center;justify-content:center;
  line-height:1.4;transition:all .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.bscore-btn:active{border-color:var(--gold);}
.bscore-btn.picked{background:#3ecf7015;border-color:var(--win);color:var(--win);}
.bscore-btn.lost{opacity:.28;border-color:#1e1e1e;}
.bscore-btn:disabled{opacity:.3;cursor:default;}

/* ── BUTTONS ── */
.primary-btn{
  width:100%;background:var(--gold);color:#0a0a0a;border:none;
  padding:14px;border-radius:10px;font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:2px;cursor:pointer;margin-top:10px;
  min-height:var(--tap);display:flex;align-items:center;justify-content:center;
}
.primary-btn:active{opacity:.85;transform:scale(.98);}
.ghost-btn{
  width:100%;background:transparent;border:1px solid var(--border2);
  color:var(--muted2);padding:14px;border-radius:10px;
  font-family:'DM Mono',monospace;font-size:13px;letter-spacing:1px;
  cursor:pointer;margin-top:10px;min-height:var(--tap);
  display:flex;align-items:center;justify-content:center;
}
.ghost-btn:active{border-color:var(--loss);color:var(--loss);}
.reset-btn{
  display:flex;align-items:center;justify-content:center;
  width:100%;background:transparent;border:1px solid #1e1e1e;
  color:var(--muted);padding:12px;border-radius:8px;
  font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;
  letter-spacing:1px;margin-top:14px;min-height:var(--tap);
}
.reset-btn:active{border-color:var(--loss);color:var(--loss);}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-eye">Beer Dye Tournament · 2026</div>
  <div class="hdr-title"><em>Clein's</em><br>Beer Dye Classic</div>
  <div class="hdr-loc">📍 Austin, TX</div>
</header>

<div id="tab-teams" class="panel active">
  <div class="sec-head">The Field</div>
  <div class="team-grid" id="teamGrid"></div>
</div>

<div id="tab-groups" class="panel">
  <div class="sec-head">Group Stage <span class="sec-sub">First to 7, win by 2</span></div>
  <div id="groupMatches"></div>
  <div class="sec-head" style="margin-top:8px;">Standings</div>

<script>
// ══ STATE ═══════════════════════════════════════════════
const K={t:'cd26_t',g:'cd26_g',s:'cd26_s',b:'cd26_b'};

// Hardcoded defaults — Group A: indices 0-3, Group B: indices 4-7
const DEFAULT_TEAMS = [
  {p1:'Josh Clein',    p2:'Alec Torgan'},    // 0 - Group A
  {p1:'Alex McIntosh', p2:'Drew Heavilon'},   // 1 - Group A
  {p1:'Benj Stern',    p2:'Jack Quigley'},    // 2 - Group A
  {p1:'Beryl Grant',   p2:'Alex Huber'},      // 3 - Group A
  {p1:'David Gordon',  p2:'Robert Justus'},   // 4 - Group B
  {p1:'Ben Ekdahl',    p2:'Jared Cohen'},     // 5 - Group B
  {p1:'Grant Parker',  p2:'Jacob Boughter'},  // 6 - Group B
  {p1:'Jim Buccholz',  p2:'Mark Blessing'},   // 7 - Group B
];
const DEFAULT_GROUPS = [[0,1,2,3],[4,5,6,7]];

let TEAMS  = JSON.parse(localStorage.getItem(K.t)||'null') || DEFAULT_TEAMS;
let GROUPS = JSON.parse(localStorage.getItem(K.g)||'null') || DEFAULT_GROUPS;
let SCORES = JSON.parse(localStorage.getItem(K.s)||'null') || {gA:Array(6).fill(null).map(()=>({a:'',b:''})),gB:Array(6).fill(null).map(()=>({a:'',b:''}))};
let BRES = JSON.parse(localStorage.getItem(K.b)||'null') || {};
const RR=[[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];

function save(){
  localStorage.setItem(K.t,JSON.stringify(TEAMS));
  localStorage.setItem(K.g,JSON.stringify(GROUPS));
  localStorage.setItem(K.s,JSON.stringify(SCORES));
  localStorage.setItem(K.b,JSON.stringify(BRES));
}

// Short display: "Jake & Mike"
function tshort(i){
  if(i===null||i===undefined) return null;
  const t=TEAMS[i]; if(!t) return `T${i+1}`;
  const a=(t.p1||'').split(' ')[0]||`?`;
  const b=(t.p2||'').split(' ')[0]||`?`;
  return `${a} & ${b}`;
}
// Full display: "Jake Smith & Mike Jones"
function tfull(i){
  if(i===null||i===undefined) return null;
  const t=TEAMS[i]; if(!t) return `Team ${i+1}`;
  return `${t.p1||'?'} & ${t.p2||'?'}`;
}

// ══ TABS ════════════════════════════════════════════════
function showTab(name,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='teams') renderTeams();
  if(name==='groups') renderGroups();
  if(name==='bracket') renderBracket();
  if(name==='admin') renderAdmin();
}

// ══ STANDINGS ═══════════════════════════════════════════
function getStandings(g){
  const gKey=g===0?'gA':'gB';
  const recs=GROUPS[g].map(ti=>({idx:ti,w:0,l:0,pf:0,pa:0}));
  RR.forEach((pair,mi)=>{
    const sc=SCORES[gKey][mi];
    if(!sc||sc.a===''||sc.b==='') return;
    const sa=parseInt(sc.a),sb=parseInt(sc.b);
    if(isNaN(sa)||isNaN(sb)) return;
    recs[pair[0]].pf+=sa; recs[pair[0]].pa+=sb;
    recs[pair[1]].pf+=sb; recs[pair[1]].pa+=sa;
    if(sa>sb){recs[pair[0]].w++;recs[pair[1]].l++;}
    else if(sb>sa){recs[pair[1]].w++;recs[pair[0]].l++;}
  });
  recs.sort((a,b)=>{
    if(b.w!==a.w) return b.w-a.w;
    const da=a.pf-a.pa,db=b.pf-b.pa;
    if(db!==da) return db-da;
    return h2h(g,a.idx,b.idx);
  });
  return recs;
}
function h2h(g,iA,iB){
  const gKey=g===0?'gA':'gB';
  const lA=GROUPS[g].indexOf(iA),lB=GROUPS[g].indexOf(iB);
  const mi=RR.findIndex(p=>(p[0]===lA&&p[1]===lB)||(p[0]===lB&&p[1]===lA));
  if(mi<0) return 0;
  const sc=SCORES[gKey][mi];
  if(!sc||sc.a===''||sc.b==='') return 0;
  const sa=parseInt(sc.a),sb=parseInt(sc.b);
  if(isNaN(sa)||isNaN(sb)) return 0;
  const aFirst=GROUPS[g][RR[mi][0]]===iA;
  return (aFirst?sa>sb:sb>sa)?-1:1;
}
function getSeeds(){
  const sA=getStandings(0),sB=getStandings(1);
  return{A1:sA[0]?.idx,A2:sA[1]?.idx,A3:sA[2]?.idx,A4:sA[3]?.idx,
         B1:sB[0]?.idx,B2:sB[1]?.idx,B3:sB[2]?.idx,B4:sB[3]?.idx};
}
function seedLbl(i){
  if(i===null||i===undefined) return '?';
  const sA=getStandings(0),sB=getStandings(1);
  for(let x=0;x<4;x++){
    if(sA[x]?.idx===i) return `${x+1}A`;
    if(sB[x]?.idx===i) return `${x+1}B`;
  }
  return '?';
}

// ══ TEAMS TAB ═══════════════════════════════════════════
function renderTeams(){
  const grid=document.getElementById('teamGrid');
  grid.innerHTML='';
  const sA=getStandings(0),sB=getStandings(1);
  TEAMS.forEach((t,i)=>{
    const g=GROUPS[0].includes(i)?0:1;
    const st=g===0?sA:sB;
    const rank=st.findIndex(r=>r.idx===i)+1;
    const tile=document.createElement('div');
    tile.className='team-tile';
    tile.innerHTML=`<div class="team-tile-grp ${g===0?'ga':'gb'}">Group ${g===0?'A':'B'}</div>
      <div class="team-tile-seed">${rank}${g===0?'A':'B'}</div>
      <div class="team-tile-players">${t.p1||'—'}<br>${t.p2||'—'}</div>`;
    grid.appendChild(tile);
  });
}

// ══ GROUPS TAB ══════════════════════════════════════════
// Schedule order: alternating A/B with times
// RR indices: [0,1]=G1, [0,2]=G2, [0,3]=G3, [1,2]=G4, [1,3]=G5, [2,3]=G6
// Group A schedule: A1=RR0, A2=RR3, A3=RR1, A4=RR5, A5=RR2, A6=RR4
// Group B schedule: B1=RR0, B2=RR1, B3=RR3, B4=RR2, B5=RR4, B6=RR5
// Matchups: A1=Josh&Alec vs Alex&Drew(RR[0,1]), A2=Alex&Drew vs Benj&Jack(RR[1,2]),
//           A3=Josh&Alec vs Beryl&Alex(RR[0,3]), A4=Benj&Jack vs Beryl&Alex(RR[2,3]),
//           A5=Josh&Alec vs Benj&Jack(RR[0,2]), A6=Alex&Drew vs Beryl&Alex(RR[1,3])
// B1=David&Robert vs Ben&Jared(RR[0,1]), B2=David&Robert vs Grant&Jacob(RR[0,2]),
// B3=Ben&Jared vs Jim&Mark(RR[1,3]), B4=David&Robert vs Jim&Mark(RR[0,3]),
// B5=Ben&Jared vs Grant&Jacob(RR[1,2]), B6=Grant&Jacob vs Jim&Mark(RR[2,3])

// RR = [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]]
// Group A teams: 0=Josh&Alec, 1=Alex&Drew, 2=Benj&Jack, 3=Beryl&Alex
// Group B teams: 0=David&Robert, 1=Ben&Jared, 2=Grant&Jacob, 3=Jim&Mark
//
// Schedule matchups:
// A1: Josh(0) vs Alex(1)     → RR idx 0 = [0,1] ✓
// A2: Alex(1) vs Benj(2)     → RR idx 3 = [1,2] ✓
// A3: Josh(0) vs Beryl(3)    → RR idx 2 = [0,3] ✓
// A4: Benj(2) vs Beryl(3)    → RR idx 5 = [2,3] ✓
// A5: Josh(0) vs Benj(2)     → RR idx 1 = [0,2] ✓
// A6: Alex(1) vs Beryl(3)    → RR idx 4 = [1,3] ✓
// B1: David(0) vs Ben(1)     → RR idx 0 = [0,1] ✓
// B2: David(0) vs Grant(2)   → RR idx 1 = [0,2] ✓
// B3: Ben(1) vs Jim(3)       → RR idx 4 = [1,3] ✓
// B4: David(0) vs Jim(3)     → RR idx 2 = [0,3] ✓
// B5: Ben(1) vs Grant(2)     → RR idx 3 = [1,2] ✓
// B6: Grant(2) vs Jim(3)     → RR idx 5 = [2,3] ✓

const SCHEDULE = [
  {time:'11:30', game:'A1', g:0, rrIdx:0},
  {time:'11:45', game:'B1', g:1, rrIdx:0},
  {time:'12:00', game:'A2', g:0, rrIdx:3},
  {time:'12:15', game:'B2', g:1, rrIdx:1},
  {time:'12:30', game:'A3', g:0, rrIdx:2},
  {time:'12:45', game:'B3', g:1, rrIdx:4},
  {time:'1:00',  game:'A4', g:0, rrIdx:5},
  {time:'1:15',  game:'B4', g:1, rrIdx:2},
  {time:'1:30',  game:'A5', g:0, rrIdx:1},
  {time:'1:45',  game:'B5', g:1, rrIdx:3},
  {time:'2:00',  game:'A6', g:0, rrIdx:4},
  {time:'2:15',  game:'B6', g:1, rrIdx:5},
];

function renderGroups(){
  const gm=document.getElementById('groupMatches');
  gm.innerHTML='';

  // Combined schedule view
  const schedHead=document.createElement('div');
  schedHead.innerHTML=`<div class="group-block-head ga" style="color:var(--gold);margin-bottom:12px;">Schedule <span class="group-block-note">· first to 7, win by 2 · 15 min/game</span></div>`;
  gm.appendChild(schedHead);

  SCHEDULE.forEach(({time,game,g,rrIdx})=>{
    const gKey=g===0?'gA':'gB';
    const pair=RR[rrIdx];
    const tA=GROUPS[g][pair[0]], tB=GROUPS[g][pair[1]];
    const sc=SCORES[gKey][rrIdx];
    const sa=parseInt(sc?.a), sb=parseInt(sc?.b);
    const has=sc&&sc.a!==''&&sc.b!==''&&!isNaN(sa)&&!isNaN(sb);
    const winner=has?(sa>sb?tA:sb>sa?tB:null):null;
    const grpCls=g===0?'ga':'gb';
    const row=document.createElement('div');
    row.className='match-row';
    row.innerHTML=`
      <span class="match-num" style="min-width:34px;font-size:10px;color:var(--muted2);">${time}</span>
      <span class="match-num" style="min-width:22px;font-size:9px;color:var(--${g===0?'wb':'lb'});">${game}</span>
      <div class="match-teams">
        <div class="mteam ${winner===tA?'win':winner!==null?'lose':''}">${tshort(tA)}</div>
        <span class="mvs">VS</span>
        <div class="mteam ${winner===tB?'win':winner!==null?'lose':''}">${tshort(tB)}</div>
      </div>
      <div class="mscore">${has?`${sa}–${sb}`:''}</div>`;
    gm.appendChild(row);
  });

  // Standings
  const gs=document.getElementById('groupStandings');
  gs.innerHTML='';
  [0,1].forEach(g=>{
    const s=getStandings(g);
    const letter=g===0?'A':'B';
    const card=document.createElement('div');
    card.className='std-card';
    card.innerHTML=`<div class="std-card-head" style="color:var(--${g===0?'wb':'lb'})">Group ${letter} Standings</div>
      <table class="std-tbl">
        <tr><th>#</th><th>Team</th><th>W</th><th>L</th><th>+/-</th></tr>
        ${s.map((r,i)=>`<tr>
          <td class="std-rank">${i+1}</td>
          <td>${tshort(r.idx)}</td>
          <td>${r.w}</td><td>${r.l}</td>
          <td class="std-diff">${r.pf-r.pa>0?'+':''}${r.pf-r.pa}</td>
        </tr>`).join('')}
      </table>`;
    gs.appendChild(card);
  });
}

// ══ BRACKET MODE ════════════════════════════════════════
let BRACKET_MODE = localStorage.getItem('cd26_bmode') || 'de'; // 'de' or 'se'

function _updateBracketToggle(){
  const de=document.getElementById('btnDE');
  const se=document.getElementById('btnSE');
  if(!de||!se) return;
  if(BRACKET_MODE==='de'){
    de.style.cssText='flex:1;padding:11px 8px;border-radius:8px;border:2px solid var(--wb);background:#59b9e015;color:var(--wb);font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;min-height:44px;';
    se.style.cssText='flex:1;padding:11px 8px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;min-height:44px;';
  } else {
    se.style.cssText='flex:1;padding:11px 8px;border-radius:8px;border:2px solid var(--gold);background:#e9b94c15;color:var(--gold);font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;min-height:44px;';
    de.style.cssText='flex:1;padding:11px 8px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;min-height:44px;';
  }
}

function setBracketMode(mode){
  BRACKET_MODE = mode;
  localStorage.setItem('cd26_bmode', mode);
  renderBracket();
}

// ── SINGLE ELIM STATE ──
// SE results: SR[id] = winning team index
let SRES = JSON.parse(localStorage.getItem('cd26_se')||'null') || {};
let SSCORES = JSON.parse(localStorage.getItem('cd26_ssc')||'null') || {};

function seCascReset(id){
  delete SRES[id]; delete SSCORES[id];
  const deps={Q1:['S1'],Q2:['S1'],Q3:['S2'],Q4:['S2'],S1:['F'],S2:['F'],F:[]};
  (deps[id]||[]).forEach(seCascReset);
}
function seResM(id,tA,tB){
  const r=SRES[id]!==undefined?SRES[id]:null;
  let w=null,l=null;
  if(r!==null&&tA!==null&&tB!==null){if(r===tA){w=tA;l=tB;}else if(r===tB){w=tB;l=tA;}}
  const sc=SSCORES[id]||null;
  return{id,tA,tB,w,l,sc};
}
function buildSE(){
  const s=getSeeds();
  const Q1=seResM('Q1',s.A1,s.B4);
  const Q2=seResM('Q2',s.A2,s.B3);
  const Q3=seResM('Q3',s.A3,s.B2);
  const Q4=seResM('Q4',s.A4,s.B1);
  const S1=seResM('S1',Q1.w,Q2.w);  // 1-seed side: winner of A1/B4 vs winner of A2/B3
  const S2=seResM('S2',Q3.w,Q4.w);  // 2-seed side
  const F=seResM('F',S1.w,S2.w);
  return{Q1,Q2,Q3,Q4,S1,S2,F};
}

function openSEModal(id,tA,tB){
  if(tA===null||tB===null||tA===undefined||tB===undefined) return;
  _modalId='SE:'+id; _modalTA=tA; _modalTB=tB;
  const sc=SSCORES[id]||{a:'',b:''};
  const el=document.getElementById('scoreModal');
  el.innerHTML=`<div class="score-modal-overlay" onclick="closeModal(event)">
    <div class="score-modal">
      <div class="score-modal-title">Enter Score</div>
      <div class="score-modal-sub">First to 11, win by 2 · then tap the winner</div>
      <div class="score-modal-row">
        <div class="score-modal-team">
          <div class="score-modal-nm">${tshort(tA)}</div>
          <input class="score-modal-input" id="ms_a" type="number" inputmode="numeric" min="0" max="99" value="${sc.a}" placeholder="0">
        </div>
        <span class="score-modal-vs">VS</span>
        <div class="score-modal-team">
          <div class="score-modal-nm">${tshort(tB)}</div>
          <input class="score-modal-input" id="ms_b" type="number" inputmode="numeric" min="0" max="99" value="${sc.b}" placeholder="0">
        </div>
      </div>
      <div class="score-modal-win-row">
        <button class="smbtn" style="background:var(--wb);color:#0a0a0a;" onclick="seSaveAndPick('${id}',${tA})">${tshort(tA)}<span class="smbtn-sub">Wins</span></button>
        <button class="smbtn" style="background:var(--lb);color:#0a0a0a;" onclick="seSaveAndPick('${id}',${tB})">${tshort(tB)}<span class="smbtn-sub">Wins</span></button>
      </div>
      <div class="score-modal-btns">
        <button class="score-modal-save-only" onclick="seSaveOnly('${id}')">Save Score Only</button>
        <button class="score-modal-cancel" onclick="closeModalEl()">Cancel</button>
      </div>
    </div>
  </div>`;
}
function seSaveOnly(id){
  const a=document.getElementById('ms_a')?.value||'';
  const b=document.getElementById('ms_b')?.value||'';
  SSCORES[id]={a,b};
  localStorage.setItem('cd26_ssc',JSON.stringify(SSCORES));
  closeModalEl(); renderBracket();
}
function seSaveAndPick(id,winner){
  const a=document.getElementById('ms_a')?.value||'';
  const b=document.getElementById('ms_b')?.value||'';
  SSCORES[id]={a,b};
  if(SRES[id]===winner) seCascReset(id); else SRES[id]=winner;
  localStorage.setItem('cd26_se',JSON.stringify(SRES));
  localStorage.setItem('cd26_ssc',JSON.stringify(SSCORES));
  closeModalEl(); renderBracket();
}

function renderSE(){
  const se=buildSE();
  document.getElementById('lbGrid').innerHTML='';
  document.getElementById('gfGrid').innerHTML='';

  const wrap=document.getElementById('wbGrid'); wrap.innerHTML='';

  // Info bar
  const info=document.createElement('div');

const DEPS={
  W1:['W5','L1'],W2:['W5','L2'],W3:['W6','L2'],W4:['W6','L1'],
  W5:['W7','L3'],W6:['W7','L4'],W7:['GF1','L6'],
  L1:['L3'],L2:['L4'],L3:['L5'],L4:['L5'],
  L5:['L6'],L6:['GF1'],GF1:['GF2'],GF2:[],
};

// Bracket scores: BSCORES[id] = {a: scoreA, b: scoreB}
let BSCORES = JSON.parse(localStorage.getItem('cd26_bs')||'null') || {};

function cascReset(id){
  delete BRES[id]; delete BSCORES[id];
  (DEPS[id]||[]).forEach(cascReset);
}

function resM(id,tA,tB){
  const r=BRES[id]!==undefined?BRES[id]:null;
  let w=null,l=null;
  if(r!==null&&tA!==null&&tB!==null){if(r===tA){w=tA;l=tB;}else if(r===tB){w=tB;l=tA;}}
  const sc=BSCORES[id]||null;
  return{id,tA,tB,w,l,sc};
}

function buildBracket(){
  const s=getSeeds();
  const W1=resM('W1',s.A1,s.B4),W2=resM('W2',s.A2,s.B3),W3=resM('W3',s.A3,s.B2),W4=resM('W4',s.A4,s.B1);
  const W5=resM('W5',W1.w,W2.w),W6=resM('W6',W3.w,W4.w),W7=resM('W7',W5.w,W6.w);
  const L1=resM('L1',W1.l,W4.l),L2=resM('L2',W2.l,W3.l);
  const L3=resM('L3',W5.l,L1.w),L4=resM('L4',W6.l,L2.w);
  const L5=resM('L5',L3.w,L4.w),L6=resM('L6',W7.l,L5.w);
  const wbC=W7.w,lbC=L6.w;
  const GF1=resM('GF1',wbC,lbC);
  const gf2=GF1.w===lbC&&lbC!==null;
  const GF2=gf2?resM('GF2',wbC,lbC):{id:'GF2',tA:null,tB:null,w:null,l:null,sc:null};
  const champ=GF1.w===wbC&&wbC!==null?wbC:(GF2.w===lbC&&lbC!==null?lbC:null);
  return{W1,W2,W3,W4,W5,W6,W7,L1,L2,L3,L4,L5,L6,GF1,GF2,wbC,lbC,gf2,champ};
}

// Lookup what score a team had in a previous match
function prevScore(m, tIdx){
  if(!m||!m.sc||tIdx===null||tIdx===undefined) return '';
  const isA = m.tA===tIdx;
  const sa=parseInt(m.sc.a), sb=parseInt(m.sc.b);
  if(isNaN(sa)||isNaN(sb)) return '';
  return isA ? `${sa}-${sb}` : `${sb}-${sa}`;
}

// Lookup score from team's perspective in a previous match
function prevScore(m, tIdx){
  if(!m||!m.sc||tIdx===null||tIdx===undefined) return '';
  const sa=parseInt(m.sc.a),sb=parseInt(m.sc.b);
  if(isNaN(sa)||isNaN(sb)) return '';
  return m.tA===tIdx ? `${sa}-${sb}` : `${sb}-${sa}`;
}

// Make a single match slot element
function makeSlot(m, cls, rule){
  const wrap=document.createElement('div');
  wrap.className='bslot';
  const inner=document.createElement('div');
  inner.className=`bslot-inner ${cls}-slot`;
  [m.tA,m.tB].forEach(tIdx=>{
    const row=document.createElement('div');
    if(tIdx===null||tIdx===undefined){
      row.className='brow tbd'; row.textContent='TBD';
    } else {
      const isW=m.w===tIdx, isL=m.l===tIdx;
      row.className=`brow${isW?' win':''}${isL?' lose':''}`;
      const sc=prevScore(m,tIdx);
      row.innerHTML=`<span class="brow-seed">${seedLbl(tIdx)}</span><span class="brow-name">${tshort(tIdx)}</span>${sc?`<span class="brow-score">${sc}</span>`:''}`;
      row.onclick=()=>openScoreModal(m.id,m.tA,m.tB,rule);
    }
    inner.appendChild(row);
  });
  wrap.appendChild(inner);
  return wrap;
}

// Make a column of match slots
function makeCol(matches, cls, rule){
  const col=document.createElement('div');
  col.className='bracket-col';
  matches.forEach(m=>col.appendChild(makeSlot(m,cls,rule)));
  return col;
}

// Column header
function colHead(label, color){

  return d;
}

// Section divider
function sectionDiv(label, color){

// SVG line drawing helpers
function elMidY(el, ref){ const er=el.getBoundingClientRect(),cr=ref.getBoundingClientRect(); return er.top-cr.top+er.height/2; }
function elRight(el, ref){ const er=el.getBoundingClientRect(),cr=ref.getBoundingClientRect(); return er.right-cr.left; }
function elLeft(el, ref){ const er=el.getBoundingClientRect(),cr=ref.getBoundingClientRect(); return er.left-cr.left; }

function drawConnector(svg, ref, fromEl, toEl, color){
  const x1=elRight(fromEl,ref), y1=elMidY(fromEl,ref);
  const x2=elLeft(toEl,ref),   y2=elMidY(toEl,ref);
  const mx=(x1+x2)/2;
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',`M${x1},${y1} H${mx} V${y2} H${x2}`);
  path.setAttribute('fill','none');
  path.setAttribute('stroke',color);
  path.setAttribute('stroke-width','1.5');
  svg.appendChild(path);
}

function makeSvg(grid){
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.style.cssText='position:absolute;inset:0;pointer-events:none;overflow:visible;width:100%;height:100%;';
  grid.style.position='relative';
  grid.appendChild(svg);
  return svg;
}

function closeModal(e){

}

function saveScoreOnly(){

}

function saveAndPick(winner){
  if(!_modalId) return;
  const a=document.getElementById('ms_a').value;
  const b=document.getElementById('ms_b').value;
  BSCORES[_modalId]={a,b};
  localStorage.setItem('cd26_bs',JSON.stringify(BSCORES));

  else BRES[_modalId]=winner;
  save();
  closeModalEl();
  renderBracket();
  if(document.getElementById('tab-admin').classList.contains('active')) renderAdminBracketScores();
}

    col.innerHTML=`<div class="assign-col-head ${g===0?'ga':'gb'}">Group ${g===0?'A':'B'}</div>`;
    for(let s=0;s<4;s++){
      const tIdx=GROUPS[g][s];
      const div=document.createElement('div');
      div.className=`assign-slot ${g===0?'ga-slot':'gb-slot'}`;
      if(tIdx!==undefined){
        const t=TEAMS[tIdx];
        const nm=`${t?.p1||'?'} & ${t?.p2||'?'}`;
        div.innerHTML=`<span class="slot-num">${s+1}</span><span class="slot-name filled">${nm}</span>`;
        const x=document.createElement('div');
        x.className='slot-x'; x.textContent='✕';
        x.onclick=(e)=>{e.stopPropagation();removeSlot(g,s);};
        div.appendChild(x);
      } else {
        div.innerHTML=`<span class="slot-num">${s+1}</span><span class="slot-name">empty</span>`;
      }
      col.appendChild(div);
    }
    grid.appendChild(col);
  });
  el.appendChild(grid);
  // Picker buttons
  const pl=document.createElement('div'); pl.className='picker-lbl';
  pl.textContent='Tap to assign → fills Group A first:';
  el.appendChild(pl);
  const pg=document.createElement('div'); pg.className='picker-grid';
  TEAMS.forEach((t,i)=>{
    const inA=GROUPS[0].includes(i),inB=GROUPS[1].includes(i);
    const btn=document.createElement('button');
    btn.className=`picker-btn${inA?' in-a':inB?' in-b':''}`;
    btn.textContent=`${t.p1||`P${i*2+1}`}\n& ${t.p2||`P${i*2+2}`}`;
    btn.style.whiteSpace='pre-line';
    btn.onclick=()=>assignTeam(i);
    pg.appendChild(btn);
  });
  el.appendChild(pg);
}
function assignTeam(i){
  let removed=false;
  [0,1].forEach(g=>{const idx=GROUPS[g].indexOf(i);if(idx!==-1){GROUPS[g].splice(idx,1);removed=true;}});
  if(!removed){
    if(GROUPS[0].length<4) GROUPS[0].push(i);
    else if(GROUPS[1].length<4) GROUPS[1].push(i);
  }
  save(); renderGroupAssign();
}
function removeSlot(g,s){GROUPS[g].splice(s,1);save();renderGroupAssign();}
function randomizeGroups(){
  const sh=[0,1,2,3,4,5,6,7].sort(()=>Math.random()-.5);
  GROUPS=[[...sh.slice(0,4)],[...sh.slice(4,8)]];
  save(); renderGroupAssign();
}
function confirmGroups(){
  if(GROUPS[0].length!==4||GROUPS[1].length!==4){alert('Each group needs exactly 4 teams.');return;}
  save(); updatePhaseNums();
  const btn=document.querySelector('#pbody2 .primary-btn');
  btn.textContent='✓ Groups Locked!'; btn.style.background='var(--win)';
  setTimeout(()=>{btn.textContent='Lock Groups →';btn.style.background='';},1500);
  renderAdminGroupScores();
}

// Phase 3 — Group scores
function renderAdminGroupScores(){
  const el=document.getElementById('adminGroupScores'); el.innerHTML='';
  [0,1].forEach(g=>{
    const gKey=g===0?'gA':'gB';
    const lbl=document.createElement('div'); lbl.className='score-section-lbl';
    lbl.textContent=`Group ${g===0?'A':'B'} Games`;
    el.appendChild(lbl);
    RR.forEach((pair,mi)=>{
      const tA=GROUPS[g][pair[0]],tB=GROUPS[g][pair[1]];
      const sc=SCORES[gKey][mi];
      const card=document.createElement('div'); card.className='score-game-card';
      card.innerHTML=`<div class="score-game-lbl">Game ${mi+1}<br>${tshort(tA)} vs ${tshort(tB)}</div>
        <div class="score-row">
          <div class="score-team-col">
            <div class="score-team-nm">${tshort(tA)}</div>
            <input class="score-big" id="sg${g}${mi}a" type="number" inputmode="numeric" min="0" max="99" value="${sc?.a??''}" placeholder="0">
          </div>
          <span class="score-vs">VS</span>
          <div class="score-team-col">
            <div class="score-team-nm">${tshort(tB)}</div>
            <input class="score-big" id="sg${g}${mi}b" type="number" inputmode="numeric" min="0" max="99" value="${sc?.b??''}" placeholder="0">
          </div>
        </div>
        <button class="save-btn" id="sgbtn${g}${mi}" onclick="saveGroupScore(${g},${mi})">Save Score</button>`;
      el.appendChild(card);
    });
  });
}
function saveGroupScore(g,mi){
  const gKey=g===0?'gA':'gB';
  const a=document.getElementById(`sg${g}${mi}a`).value;
  const b=document.getElementById(`sg${g}${mi}b`).value;
  SCORES[gKey][mi]={a,b};
  save(); updatePhaseNums();
  const btn=document.getElementById(`sgbtn${g}${mi}`);
  btn.textContent='✓ Saved!'; btn.classList.add('saved');
  setTimeout(()=>{btn.textContent='Save Score';btn.classList.remove('saved');},1200);
  if(document.getElementById('tab-groups').classList.contains('active')) renderGroups();
}

// Phase 4 — Bracket scores
function renderAdminBracketScores(){
  const de=buildBracket();
  const el=document.getElementById('adminBracketScores'); el.innerHTML='';
  const matches=[
    {m:de.W1,lbl:'WB R1 · 1A vs 4B'},{m:de.W2,lbl:'WB R1 · 2A vs 3B'},
    {m:de.W3,lbl:'WB R1 · 3A vs 2B'},{m:de.W4,lbl:'WB R1 · 4A vs 1B'},
    {m:de.W5,lbl:'WB Semifinal 1'},{m:de.W6,lbl:'WB Semifinal 2'},
    {m:de.W7,lbl:'WB Final'},
    {m:de.L1,lbl:'LB Round 1'},{m:de.L2,lbl:'LB Round 1'},
    {m:de.L3,lbl:'LB Round 2'},{m:de.L4,lbl:'LB Round 2'},
    {m:de.L5,lbl:'LB Semifinal'},{m:de.L6,lbl:'LB Final'},
    {m:de.GF1,lbl:'Grand Final · Game 1'},
    {m:de.GF2,lbl:'Grand Final · Game 2'},
  ];
  let shown=0;
  matches.forEach(({m,lbl})=>{
    if(m.tA===null&&m.tB===null) return;
    shown++;
    const unavail=m.tA===null||m.tB===null;
    const nmA=tshort(m.tA)||'TBD',nmB=tshort(m.tB)||'TBD';
    const card=document.createElement('div');
    card.className='bscore-card';
    if(unavail) card.style.opacity='.4';
    card.innerHTML=`<div class="bscore-lbl">${lbl}</div>
      <div class="bscore-btns">
        <button class="bscore-btn${m.w===m.tA?' picked':m.w!==null?' lost':''}"
          ${unavail||m.tA===null?'disabled':''}
          onclick="openScoreModal('${m.id}',${m.tA},${m.tB})">${nmA}</button>
        <button class="bscore-btn${m.w===m.tB?' picked':m.w!==null?' lost':''}"
          ${unavail||m.tB===null?'disabled':''}
          onclick="openScoreModal('${m.id}',${m.tA},${m.tB})">${nmB}</button>
      </div>`;
    el.appendChild(card);
  });
  if(shown===0){
    el.innerHTML='<div class="info-box">Complete group stage scores first — bracket will populate automatically.</div>';
  }
}

// ══ INIT ════════════════════════════════════════════════
renderTeams();
</script>
